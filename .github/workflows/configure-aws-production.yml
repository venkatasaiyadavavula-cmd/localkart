name: Configure AWS production

on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: AWS_ACCESS_KEY_ID
        required: true
        type: string
      aws_secret_access_key:
        description: AWS_SECRET_ACCESS_KEY
        required: true
        type: string
      aws_region:
        description: AWS_REGION
        required: true
        default: ap-south-1
        type: string
      aws_bucket_name:
        description: AWS_BUCKET_NAME
        required: true
        default: localkart-media
        type: string

concurrency:
  group: configure-aws-production
  cancel-in-progress: false

jobs:
  configure:
    name: Sync AWS creds on production server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync AWS to production .env and restart backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
          AWS_REGION: ${{ inputs.aws_region }}
          AWS_BUCKET_NAME: ${{ inputs.aws_bucket_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 10m
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,AWS_BUCKET_NAME
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/localkart"; fi
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            bash "$APP_DIR/scripts/sync-aws-env.sh" "$APP_DIR/backend/.env"
            cd "$APP_DIR/backend"
            pm2 restart localkart-backend --update-env
            pm2 save
            echo "=== Verify AWS key prefix in .env (not logged) ==="
            KEY_PREFIX=$(grep '^AWS_ACCESS_KEY_ID=' .env | cut -d= -f2- | cut -c1-4)
            test "$KEY_PREFIX" != "your"
            echo "OK: AWS_ACCESS_KEY_ID starts with ${KEY_PREFIX}…"
            echo "=== Backend restarted ==="
