name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          QA_THROTTLE_BYPASS_TOKEN: ${{ secrets.QA_THROTTLE_BYPASS_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 30m
          envs: QA_THROTTLE_BYPASS_TOKEN
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/localkart"; fi
            echo "=== Deploying in $APP_DIR ==="
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            if [ -n "${QA_THROTTLE_BYPASS_TOKEN:-}" ]; then
              ENV_FILE="backend/.env"
              touch "$ENV_FILE"
              if grep -q '^QA_THROTTLE_BYPASS_TOKEN=' "$ENV_FILE"; then
                sed -i "s|^QA_THROTTLE_BYPASS_TOKEN=.*|QA_THROTTLE_BYPASS_TOKEN=${QA_THROTTLE_BYPASS_TOKEN}|" "$ENV_FILE"
              else
                echo "QA_THROTTLE_BYPASS_TOKEN=${QA_THROTTLE_BYPASS_TOKEN}" >> "$ENV_FILE"
              fi
            fi
            cd backend
            npm ci
            npm run build
            npm run migration:run
            cd ../frontend
            npm ci
            export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-https://api.localkart.store/api/v1}"
            echo "Building frontend with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            npm run build
            bash "$APP_DIR/scripts/check-no-localhost-build.sh" "$APP_DIR/frontend"
            bash scripts/copy-standalone-assets.sh
            pm2 restart localkart-backend
            # Always run via `next start` — standalone server.js omits .next/static unless copied.
            pm2 delete localkart-frontend 2>/dev/null || true
            pm2 start ecosystem.config.cjs --cwd "$APP_DIR/frontend"
            pm2 save
            pm2 status
            echo "--- Verify static assets on server ---"
            SITE_URL="${SITE_URL:-https://localkart.store}" bash "$APP_DIR/scripts/verify-static-assets.sh"
            echo "=== Deploy complete ==="

      - name: Checkout repo for QA scripts
        uses: actions/checkout@v4

      - name: Post-deploy smoke test
        env:
          QA_THROTTLE_BYPASS_TOKEN: ${{ secrets.QA_THROTTLE_BYPASS_TOKEN }}
        run: |
          sleep 20
          for i in $(seq 1 15); do
            if curl -sf https://api.localkart.store/api/v1/catalog/products > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 5
          done
          bash scripts/verify-static-assets.sh
          bash scripts/qa-smoke.sh
          bash scripts/qa-checkout-cod.sh
          bash scripts/qa-html-sweep.sh
          bash scripts/run-playwright-e2e.sh --project=desktop
