name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          QA_THROTTLE_BYPASS_TOKEN: ${{ secrets.QA_THROTTLE_BYPASS_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 30m
          envs: QA_THROTTLE_BYPASS_TOKEN
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/localkart"; fi
            echo "=== Deploying in $APP_DIR ==="
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            bash "$APP_DIR/scripts/sync-qa-throttle-env.sh" "$APP_DIR/backend/.env"
            cd backend
            npm ci
            npm run build
            npm run migration:run
            cd ../frontend
            npm ci
            export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-https://api.localkart.store/api/v1}"
            # NEXT_PUBLIC_* vars are inlined at build time — sync Razorpay key from backend .env (not read at runtime).
            if [ -f "$APP_DIR/backend/.env" ]; then
              RZP_KEY="$(grep -E '^RAZORPAY_KEY_ID=' "$APP_DIR/backend/.env" | cut -d= -f2- | tr -d '"' | tr -d "'")"
              if [ -n "$RZP_KEY" ]; then
                export NEXT_PUBLIC_RAZORPAY_KEY_ID="$RZP_KEY"
              fi
            fi
            echo "Building frontend with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            if [ -n "${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}" ]; then
              echo "NEXT_PUBLIC_RAZORPAY_KEY_ID is set (${#NEXT_PUBLIC_RAZORPAY_KEY_ID} chars)"
            else
              echo "::warning::NEXT_PUBLIC_RAZORPAY_KEY_ID not set — Commission Pay Now uses API key fallback only if backend returns key"
            fi
            export NODE_OPTIONS=--max-old-space-size=2048
            npm run build
            bash "$APP_DIR/scripts/check-no-localhost-build.sh" "$APP_DIR/frontend"
            bash scripts/copy-standalone-assets.sh
            cd "$APP_DIR/backend"
            pm2 delete localkart-backend 2>/dev/null || true
            pm2 start ecosystem.config.cjs --update-env
            pm2 save
            cd "$APP_DIR/frontend"
            pm2 delete localkart-frontend 2>/dev/null || true
            pm2 start ecosystem.config.cjs --cwd "$APP_DIR/frontend"
            pm2 save
            pm2 status
            echo "--- Verify static assets on server ---"
            SITE_URL="${SITE_URL:-https://localkart.store}" bash "$APP_DIR/scripts/verify-static-assets.sh"
            echo "=== Deploy complete ==="

      - name: Checkout repo for QA scripts
        uses: actions/checkout@v4

      - name: Post-deploy smoke test
        env:
          QA_THROTTLE_BYPASS_TOKEN: ${{ secrets.QA_THROTTLE_BYPASS_TOKEN }}
        run: |
          if [ -z "${QA_THROTTLE_BYPASS_TOKEN:-}" ]; then
            echo "::error::Set GitHub secret QA_THROTTLE_BYPASS_TOKEN (openssl rand -hex 32) — required so Playwright is not rate-limited"
            exit 1
          fi
          sleep 20
          for i in $(seq 1 15); do
            if curl -sf https://api.localkart.store/api/v1/catalog/products > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 5
          done
          bash scripts/verify-static-assets.sh
          bash scripts/verify-qa-throttle-bypass.sh
          bash scripts/qa-smoke.sh
          bash scripts/qa-checkout-cod.sh
          bash scripts/qa-html-sweep.sh
          bash scripts/run-playwright-e2e.sh --project=desktop
