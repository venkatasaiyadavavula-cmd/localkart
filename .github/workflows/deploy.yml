name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/localkart"; fi
            echo "=== Deploying in $APP_DIR ==="
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd backend
            npm ci
            npm run build
            npm run migration:run
            cd ../frontend
            npm ci
            npm run build
            bash scripts/copy-standalone-assets.sh
            pm2 restart localkart-backend
            pm2 delete localkart-frontend 2>/dev/null || true
            HOSTNAME=0.0.0.0 PORT=3000 pm2 start npm --name localkart-frontend --cwd "$APP_DIR/frontend" -- start
            pm2 save
            pm2 status
            echo "=== Deploy complete ==="

      - name: Checkout repo for QA scripts
        uses: actions/checkout@v4

      - name: Post-deploy smoke test
        run: |
          sleep 20
          for i in $(seq 1 15); do
            if curl -sf https://api.localkart.store/api/v1/catalog/products > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 5
          done
          bash scripts/qa-smoke.sh
          bash scripts/qa-checkout-cod.sh
